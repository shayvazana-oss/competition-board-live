  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;

            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }

      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  <script type="__bundler/template">"\u003c!DOCTYPE html>\n\u003chtml>\u003chead>\n\u003cmeta charset=\"utf-8\">\n\u003cmeta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n\u003cscript src=\"923fde50-123f-46f9-883f-5fa9100b9cae\">\u003c/script>\n\n\u003c/head>\n\u003cbody>\n\u003cdiv id=\"__pwgate\" dir=\"rtl\" style=\"position:fixed;inset:0;z-index:2147483647;background:#EEF0F6;display:flex;align-items:center;justify-content:center;font-family:'Assistant',Arial,sans-serif;\">\n  \u003cdiv style=\"background:#fff;border:1px solid #E4E7F1;border-radius:20px;padding:38px 34px;width:360px;max-width:88vw;text-align:center;box-shadow:0 22px 50px -22px rgba(16,18,40,.3);\">\n    \u003cdiv style=\"width:56px;height:56px;margin:0 auto 16px;border-radius:16px;background:linear-gradient(135deg,#5A4BD4,#7C6BF0);display:flex;align-items:center;justify-content:center;box-shadow:0 8px 18px -8px rgba(90,75,212,.7);\">\n      \u003csvg width=\"26\" height=\"26\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003crect x=\"3\" y=\"11\" width=\"18\" height=\"11\" rx=\"2\">\u003c/rect>\u003cpath d=\"M7 11V7a5 5 0 0 1 10 0v4\">\u003c/path>\u003c/svg>\n    \u003c/div>\n    \u003cdiv style=\"font-family:'Rubik','Assistant',sans-serif;font-weight:700;font-size:22px;color:#191B26;\">מרכז הניקוד\u003c/div>\n    \u003cdiv style=\"font-size:14px;color:#7B8194;margin:6px 0 20px;font-weight:600;\">הזינו סיסמה לכניסה לאתר\u003c/div>\n    \u003cinput id=\"__pwinput\" type=\"password\" inputmode=\"numeric\" autocomplete=\"off\" placeholder=\"סיסמה\" style=\"width:100%;box-sizing:border-box;text-align:center;font-size:20px;font-weight:700;letter-spacing:4px;color:#191B26;background:#F7F8FC;border:1px solid #E2E4EE;border-radius:12px;padding:12px 14px;outline:none;\">\n    \u003cdiv id=\"__pwerr\" style=\"display:none;color:#D0524E;font-weight:700;font-size:13px;margin-top:10px;\">סיסמה שגויה — נסו שוב\u003c/div>\n    \u003cbutton id=\"__pwbtn\" style=\"width:100%;margin-top:16px;background:linear-gradient(135deg,#5A4BD4,#7C6BF0);color:#fff;border:none;border-radius:12px;padding:13px;font-family:'Assistant',sans-serif;font-weight:700;font-size:16px;cursor:pointer;\">כניסה\u003c/button>\n  \u003c/div>\n\u003c/div>\n\u003cscript>\n(function(){\n  var KEY='comp_pw_v2', PASS='54321';\n  var gate=document.getElementById('__pwgate');\n  if(!gate) return;\n  try{ if(sessionStorage.getItem(KEY)==='1'){ gate.parentNode.removeChild(gate); return; } }catch(e){}\n  var inp=document.getElementById('__pwinput'), btn=document.getElementById('__pwbtn'), err=document.getElementById('__pwerr');\n  function ok(){ try{sessionStorage.setItem(KEY,'1');}catch(e){} if(gate.parentNode) gate.parentNode.removeChild(gate); }\n  function check(){\n    if(inp.value===PASS){ ok(); }\n    else { err.style.display='block'; inp.value=''; inp.style.borderColor='#D0524E'; inp.focus(); }\n  }\n  btn.addEventListener('click', check);\n  inp.addEventListener('keydown', function(e){ if(e.key==='Enter') check(); });\n  setTimeout(function(){ try{ inp.focus(); }catch(e){} }, 120);\n})();\n\u003c/script>\n\n\u003c!-- LIVEBOARD_START -->\n\u003cscript>\n// ═══════════════════════════════════════════════════════════════════════\n//  מצב לייב — לוח תוצאות \"יורוויזיון\" בזמן אמת + הזנת נקודות מהירה\n//  מודול עצמאי: מתחבר ישירות ל-Firebase (window.__db) ולא תלוי ב-runtime של האפליקציה.\n// ═══════════════════════════════════════════════════════════════════════\n(function(){\n  if (window.__liveBoardInit) return;\n  window.__liveBoardInit = true;\n\n  var GROUP_COLORS = ['#7C6BF0','#0FB5A5','#F0913B','#EC6A9C','#4FA8F5','#9B7BF0','#E0C341'];\n  var db = null, latest = null, open = false, controlsOn = true;\n  var rowEls = {};          // groupIndex -> row element\n  var prevRects = {};       // groupIndex -> DOMRect (for FLIP)\n  var shownScore = {};      // groupIndex -> currently displayed (animating) score\n  var prevRank = {};        // groupIndex -> previous rank\n  var undoStack = [];       // { i, prevBonus }\n  var selected = 0;\n\n  // ── חישוב ניקוד — משוכפל במדויק מ-calc() של האפליקציה ──\n  function num(x){ var v = Number(x); return isNaN(v) ? 0 : v; }\n  function tier(v){ v = num(v); return v>=20000?80 : v>=5000?40 : v>0?20 : 0; }\n  function scoreOf(g){\n    if(!g) return { final:0, auto:0, judge:0, votes:0 };\n    var reviews = g.reviews||{}, leads = g.leads||{}, rec = g.rec||{};\n    var revApproved = Math.max(0, num(reviews.withDetail) - num(reviews.rejected));\n    var reviewsPts = revApproved*10;\n    var leadsClosed = Math.max(0, num(leads.closed) - num(leads.rejected));\n    var leadsPts = leadsClosed*10;\n    var recApproved = Math.max(0, num(rec.count) - num(rec.rejected));\n    var recPts = recApproved*15;\n    var resonancePts = (g.resonance||[]).reduce(function(a,v){ return a + tier(v&&v.views); }, 0);\n    var salesPts = (g.sales||[]).reduce(function(a,c){ return a + num(c&&c.tier); }, 0);\n    var opsPts = (g.ops||[]).reduce(function(a,c){ return a + num(c&&c.score); }, 0);\n    var flagPts = num(g.flagship && g.flagship.score);\n    var auto = reviewsPts+leadsPts+recPts+resonancePts;\n    var judge = salesPts+opsPts+flagPts+num(g.bonus);\n    return { final: auto+judge, auto: auto, judge: judge, votes: num(g.votes) };\n  }\n  function fmt(x){ return Math.round(x).toLocaleString('en-US'); }\n\n  // ── סגנונות עזר ──\n  function css(el, s){ for(var k in s) el.style[k] = s[k]; return el; }\n  function make(tag, s, txt){ var el = document.createElement(tag); if(s) css(el, s); if(txt!=null) el.textContent = txt; return el; }\n\n  // ════════════════════ בניית ה-DOM ════════════════════\n  var launchBtn, overlay, rowsWrap, controlBar, groupBtns = [], amountInput;\n\n  function buildLaunchButton(){\n    launchBtn = make('button', {\n      position:'fixed', insetInlineStart:'20px', bottom:'20px', zIndex:'90000',\n      display:'inline-flex', alignItems:'center', gap:'9px',\n      background:'linear-gradient(135deg,#E23B54,#B4243A)', color:'#fff',\n      border:'none', borderRadius:'999px', padding:'12px 20px',\n      fontFamily:\"'Rubik','Assistant',sans-serif\", fontWeight:'800', fontSize:'15px',\n      cursor:'pointer', boxShadow:'0 12px 28px -10px rgba(226,59,84,.75)',\n      direction:'rtl'\n    });\n    launchBtn.innerHTML = '\u003cspan style=\"width:11px;height:11px;border-radius:50%;background:#fff;box-shadow:0 0 0 0 rgba(255,255,255,.7);animation:lbPulse 1.6s infinite;\">\u003c/span> מצב לייב';\n    launchBtn.onclick = openBoard;\n    document.body.appendChild(launchBtn);\n\n    var st = make('style'); st.textContent =\n      '@keyframes lbPulse{0%{box-shadow:0 0 0 0 rgba(255,255,255,.6)}70%{box-shadow:0 0 0 10px rgba(255,255,255,0)}100%{box-shadow:0 0 0 0 rgba(255,255,255,0)}}'+\n      '@keyframes lbRise{0%{opacity:0;transform:translateY(6px) scale(.9)}15%{opacity:1;transform:translateY(0) scale(1.05)}100%{opacity:0;transform:translateY(-34px) scale(1)}}'+\n      '@keyframes lbGlow{0%,100%{box-shadow:0 0 0 0 rgba(245,197,66,0)}50%{box-shadow:0 0 34px 4px rgba(245,197,66,.55)}}'+\n      '@keyframes lbLive{0%,100%{opacity:1}50%{opacity:.35}}';\n    document.head.appendChild(st);\n  }\n\n  function buildOverlay(){\n    overlay = make('div', {\n      position:'fixed', inset:'0', zIndex:'99999', display:'none',\n      flexDirection:'column', direction:'rtl',\n      background:'radial-gradient(1200px 600px at 50% -10%, #2A2065 0%, #15103C 45%, #0A0720 100%)',\n      fontFamily:\"'Assistant',sans-serif\", color:'#fff', overflow:'hidden'\n    });\n\n    // ── כותרת ──\n    var header = make('div', { display:'flex', alignItems:'center', gap:'16px', padding:'22px 34px 10px' });\n    var title = make('div', {});\n    title.innerHTML =\n      '\u003cdiv style=\"display:flex;align-items:center;gap:12px;\">'+\n        '\u003cspan style=\"display:inline-flex;align-items:center;gap:7px;background:#E23B54;color:#fff;font-family:Rubik;font-weight:800;font-size:14px;padding:5px 12px;border-radius:999px;letter-spacing:1px;animation:lbLive 1.4s infinite;\">\u003cspan style=\"width:9px;height:9px;border-radius:50%;background:#fff;\">\u003c/span>LIVE\u003c/span>'+\n        '\u003cspan style=\"font-family:Rubik;font-weight:800;font-size:34px;line-height:1;\">לוח תוצאות חי\u003c/span>'+\n      '\u003c/div>'+\n      '\u003cdiv style=\"font-size:15px;color:#B9B4E6;margin-top:7px;font-weight:600;\">הדירוג מתעדכן בזמן אמת בכל המסכים\u003c/div>';\n    header.appendChild(title);\n\n    var headerBtns = make('div', { marginInlineStart:'auto', display:'flex', gap:'10px' });\n    var toggleBtn = make('button', hdrBtnStyle(), 'הסתר בקרה');\n    toggleBtn.onclick = function(){ controlsOn = !controlsOn; controlBar.style.display = controlsOn ? 'flex' : 'none'; toggleBtn.textContent = controlsOn ? 'הסתר בקרה' : 'הצג בקרה'; requestRender(); };\n    var fsBtn = make('button', hdrBtnStyle(), 'מסך מלא');\n    fsBtn.onclick = function(){ if(document.fullscreenElement){ document.exitFullscreen(); } else { (overlay.requestFullscreen||overlay.webkitRequestFullscreen||function(){}).call(overlay); } };\n    var closeBtn = make('button', hdrBtnStyle('#E23B54'), '✕ סגור');\n    closeBtn.onclick = closeBoard;\n    headerBtns.appendChild(toggleBtn); headerBtns.appendChild(fsBtn); headerBtns.appendChild(closeBtn);\n    header.appendChild(headerBtns);\n    overlay.appendChild(header);\n\n    // ── אזור השורות ──\n    var scroll = make('div', { flex:'1', overflow:'auto', padding:'14px 34px 24px' });\n    rowsWrap = make('div', { position:'relative', display:'flex', flexDirection:'column', gap:'14px', maxWidth:'1100px', margin:'0 auto' });\n    scroll.appendChild(rowsWrap);\n    overlay.appendChild(scroll);\n\n    // ── סרגל בקרה תחתון ──\n    controlBar = make('div', {\n      display:'flex', alignItems:'center', gap:'16px', flexWrap:'wrap',\n      padding:'16px 34px', background:'rgba(10,7,32,.72)', backdropFilter:'blur(10px)',\n      borderTop:'1px solid rgba(255,255,255,.1)'\n    });\n    var cbLabel = make('div', { fontFamily:'Rubik', fontWeight:'700', fontSize:'15px', color:'#CFCAF2' }, 'הזנת נקודות:');\n    controlBar.appendChild(cbLabel);\n\n    var groupWrap = make('div', { display:'flex', gap:'8px', flexWrap:'wrap' });\n    groupWrap.id = 'lb-group-btns';\n    controlBar.appendChild(groupWrap);\n\n    var quickWrap = make('div', { display:'flex', alignItems:'center', gap:'8px', marginInlineStart:'auto' });\n    [1,5,10,50].forEach(function(v){\n      var b = make('button', quickBtnStyle(), '+'+v);\n      b.onclick = function(){ addPoints(selected, v); };\n      quickWrap.appendChild(b);\n    });\n    amountInput = make('input', {\n      width:'92px', textAlign:'center', fontFamily:'Rubik', fontWeight:'700', fontSize:'16px',\n      color:'#fff', background:'rgba(255,255,255,.1)', border:'1px solid rgba(255,255,255,.22)',\n      borderRadius:'10px', padding:'9px 8px', outline:'none'\n    });\n    amountInput.type = 'number'; amountInput.placeholder = 'סכום';\n    amountInput.onkeydown = function(e){ if(e.key==='Enter'){ applyCustom(); } };\n    quickWrap.appendChild(amountInput);\n    var addBtn = make('button', { fontFamily:'Rubik', fontWeight:'800', fontSize:'15px', color:'#fff', background:'linear-gradient(135deg,#5A4BD4,#7C6BF0)', border:'none', borderRadius:'10px', padding:'10px 18px', cursor:'pointer' }, 'הוסף ▲');\n    addBtn.onclick = applyCustom;\n    quickWrap.appendChild(addBtn);\n    var subBtn = make('button', quickBtnStyle('rgba(226,59,84,.22)','#FFB3BE'), '−');\n    subBtn.title = 'הורד את הסכום שבתיבה';\n    subBtn.onclick = function(){ var v = Number(amountInput.value)||0; if(v>0) addPoints(selected, -v); };\n    quickWrap.appendChild(subBtn);\n    var undoBtn = make('button', quickBtnStyle(), '↩︎ בטל');\n    undoBtn.onclick = undo;\n    quickWrap.appendChild(undoBtn);\n    controlBar.appendChild(quickWrap);\n\n    overlay.appendChild(controlBar);\n    document.body.appendChild(overlay);\n\n    document.addEventListener('keydown', function(e){\n      if(!open) return;\n      if(e.key==='Escape') closeBoard();\n      else if(e.key==='c'||e.key==='C'){ toggleBtn.click(); }\n    });\n  }\n\n  function hdrBtnStyle(accent){\n    return { fontFamily:'Assistant', fontWeight:'700', fontSize:'14px', color:'#fff',\n      background: accent||'rgba(255,255,255,.12)', border:'1px solid rgba(255,255,255,.2)',\n      borderRadius:'10px', padding:'9px 15px', cursor:'pointer' };\n  }\n  function quickBtnStyle(bg, col){\n    return { fontFamily:'Rubik', fontWeight:'800', fontSize:'15px', color: col||'#fff',\n      background: bg||'rgba(255,255,255,.12)', border:'1px solid rgba(255,255,255,.2)',\n      borderRadius:'10px', padding:'9px 14px', cursor:'pointer', minWidth:'46px' };\n  }\n\n  function buildGroupButtons(){\n    var wrap = document.getElementById('lb-group-btns');\n    if(!wrap || !latest || !latest.groups) return;\n    wrap.innerHTML = ''; groupBtns = [];\n    latest.groups.forEach(function(g, i){\n      var b = make('button', {\n        fontFamily:'Assistant', fontWeight:'700', fontSize:'14px', cursor:'pointer',\n        borderRadius:'10px', padding:'9px 14px', border:'2px solid transparent',\n        color:'#fff', background:'rgba(255,255,255,.1)', display:'flex', alignItems:'center', gap:'7px'\n      });\n      b.innerHTML = '\u003cspan style=\"width:10px;height:10px;border-radius:50%;background:'+GROUP_COLORS[i%GROUP_COLORS.length]+';\">\u003c/span>'+ (g.name||('קבוצה '+(i+1)));\n      b.onclick = function(){ selected = i; syncGroupButtons(); };\n      wrap.appendChild(b); groupBtns.push(b);\n    });\n    syncGroupButtons();\n  }\n  function syncGroupButtons(){\n    groupBtns.forEach(function(b, i){\n      if(i===selected){ b.style.background = 'rgba(124,107,240,.4)'; b.style.borderColor = '#7C6BF0'; }\n      else { b.style.background = 'rgba(255,255,255,.1)'; b.style.borderColor = 'transparent'; }\n    });\n  }\n\n  // ════════════════════ כתיבת נקודות (בטוח מפני התנגשויות) ════════════════════\n  function addPoints(i, delta){\n    if(!db || !latest || !latest.groups || !latest.groups[i]) return;\n    delta = Number(delta)||0; if(!delta) return;\n    var prevBonus = num(latest.groups[i].bonus);\n    undoStack.push({ i: i, prevBonus: prevBonus });\n    // טרנזקציה על שדה הבונוס בלבד — לא דורסת נתונים אחרים ובטוחה מריצות מקבילות\n    db.ref('comp_scoring_data/groups/'+i+'/bonus').transaction(function(cur){\n      return num(cur) + delta;\n    });\n    flashPlus(i, delta);\n  }\n  function applyCustom(){\n    var v = Number(amountInput.value)||0;\n    if(v){ addPoints(selected, v); amountInput.value=''; }\n  }\n  function undo(){\n    var last = undoStack.pop();\n    if(!last || !db) return;\n    db.ref('comp_scoring_data/groups/'+last.i+'/bonus').set(last.prevBonus);\n  }\n\n  // ════════════════════ Firebase ════════════════════\n  function connect(){\n    db = window.__db;\n    if(!db){ return false; }\n    db.ref('comp_scoring_data').on('value', function(snap){\n      var d = snap.val();\n      if(d && d.groups){ latest = d; if(open){ buildGroupButtons(); requestRender(); } }\n    });\n    return true;\n  }\n\n  // ════════════════════ רינדור + אנימציית FLIP ════════════════════\n  var renderQueued = false, firstRender = true;\n  // חשוב: הרינדור עצמו לא תלוי ב-requestAnimationFrame (שמושהה בטאבים ברקע) —\n  // התוכן תמיד מוצג; rAF משמש רק לאנימציה, עם רשת-ביטחון של setTimeout.\n  function requestRender(){ if(renderQueued) return; renderQueued = true; setTimeout(function(){ renderQueued = false; render(); }, 0); }\n  function nextFrame(fn){ requestAnimationFrame(fn); setTimeout(fn, 70); } // rAF + fallback אם מושהה\n\n  function render(){\n    if(!latest || !latest.groups || !open) return;\n    var groups = latest.groups.map(function(g, i){ var s = scoreOf(g); return { i:i, name: g.name||('קבוצה '+(i+1)), final:s.final, auto:s.auto, judge:s.judge, votes:s.votes }; });\n    var sorted = groups.slice().sort(function(a,b){ return b.final - a.final || b.votes - a.votes; });\n    var maxF = Math.max(1, sorted[0] ? sorted[0].final : 1);\n    var medals = ['🥇','🥈','🥉'];\n\n    // FIRST — מיקומי השורות לפני השינוי\n    prevRects = {};\n    Object.keys(rowEls).forEach(function(k){ prevRects[k] = rowEls[k].getBoundingClientRect(); });\n\n    // ודא שכל שורה קיימת + עדכן תוכן, וסדר מחדש לפי הדירוג\n    sorted.forEach(function(x, rank){\n      var el = rowEls[x.i] || createRow(x.i);\n      rowsWrap.appendChild(el); // סידור מחדש לפי הסדר החדש\n      updateRowContent(el, x, rank, maxF, medals);\n    });\n\n    // LAST — מיקומים חדשים → הפעל אנימציית החלקה\n    if(!firstRender){\n      sorted.forEach(function(x){\n        var el = rowEls[x.i]; var first = prevRects[x.i]; if(!first) return;\n        var last = el.getBoundingClientRect();\n        var dy = first.top - last.top;\n        if(Math.abs(dy) > 1){\n          el.style.transition = 'none';\n          el.style.transform = 'translateY('+dy+'px)';\n          el.getBoundingClientRect(); // reflow\n          nextFrame(function(){\n            el.style.transition = 'transform .85s cubic-bezier(.22,.9,.28,1)';\n            el.style.transform = '';\n          });\n        }\n      });\n    }\n    // הדגשת מי שעלה בדירוג\n    sorted.forEach(function(x, rank){\n      if(!firstRender && prevRank[x.i]!=null && rank \u003c prevRank[x.i]){ glowRow(rowEls[x.i]); }\n      prevRank[x.i] = rank;\n    });\n    firstRender = false;\n  }\n\n  function createRow(i){\n    var el = make('div', {\n      display:'flex', alignItems:'center', gap:'22px', padding:'20px 26px',\n      background:'rgba(255,255,255,.055)', border:'1px solid rgba(255,255,255,.1)',\n      borderRadius:'20px', backdropFilter:'blur(4px)', willChange:'transform', position:'relative'\n    });\n    el.innerHTML =\n      '\u003cdiv class=\"lb-rank\" style=\"flex-shrink:0;width:70px;height:70px;border-radius:18px;display:flex;align-items:center;justify-content:center;font-family:Rubik;font-weight:800;\">\u003c/div>'+\n      '\u003cdiv style=\"flex:1;min-width:0;\">'+\n        '\u003cdiv style=\"display:flex;align-items:baseline;gap:12px;\">'+\n          '\u003cspan class=\"lb-name\" style=\"font-family:Rubik;font-weight:700;font-size:26px;color:#fff;\">\u003c/span>'+\n          '\u003cspan class=\"lb-sub\" style=\"font-size:14px;color:#A9A4D8;font-weight:600;\">\u003c/span>'+\n        '\u003c/div>'+\n        '\u003cdiv style=\"height:14px;background:rgba(255,255,255,.09);border-radius:999px;overflow:hidden;margin-top:11px;\">'+\n          '\u003cdiv class=\"lb-bar\" style=\"height:100%;width:0;border-radius:999px;transition:width .85s cubic-bezier(.22,.9,.28,1);\">\u003c/div>'+\n        '\u003c/div>'+\n      '\u003c/div>'+\n      '\u003cdiv style=\"text-align:center;flex-shrink:0;min-width:130px;position:relative;\">'+\n        '\u003cdiv class=\"lb-score\" style=\"font-family:Rubik;font-weight:800;font-size:44px;line-height:1;color:#fff;\">0\u003c/div>'+\n        '\u003cdiv style=\"font-size:13px;color:#9A95CE;font-weight:600;margin-top:3px;\">נק׳ סה״כ\u003c/div>'+\n        '\u003cdiv class=\"lb-plus\" style=\"position:absolute;top:-6px;inset-inline-start:50%;transform:translateX(50%);font-family:Rubik;font-weight:800;font-size:22px;color:#F5C542;pointer-events:none;opacity:0;\">\u003c/div>'+\n      '\u003c/div>';\n    rowEls[i] = el;\n    return el;\n  }\n\n  function updateRowContent(el, x, rank, maxF, medals){\n    var top = rank===0;\n    var rankBg = rank===0?'linear-gradient(135deg,#F5C542,#E0A21E)':rank===1?'linear-gradient(135deg,#D8DEEC,#AEB6CC)':rank===2?'linear-gradient(135deg,#E0913B,#C2701E)':'rgba(255,255,255,.1)';\n    var rankCol = rank\u003c3?'#3A2E00':'#CFCAF2';\n    var barCol = rank===0?'linear-gradient(90deg,#F5C542,#F7D96E)':rank===1?'#C8CEDD':rank===2?'#E0913B':GROUP_COLORS[x.i%GROUP_COLORS.length];\n\n    var rankEl = el.querySelector('.lb-rank');\n    rankEl.style.background = rankBg; rankEl.style.color = rankCol;\n    rankEl.style.fontSize = rank\u003c3?'34px':'28px';\n    rankEl.textContent = rank\u003c3 ? medals[rank] : String(rank+1);\n\n    el.querySelector('.lb-name').textContent = x.name;\n    el.querySelector('.lb-sub').textContent = 'אוטומטי '+fmt(x.auto)+' · שופטים '+fmt(x.judge)+' · 🗳️ '+fmt(x.votes);\n    el.querySelector('.lb-bar').style.width = (x.final/maxF*100)+'%';\n    el.querySelector('.lb-bar').style.background = barCol;\n\n    el.style.border = top ? '1px solid rgba(245,197,66,.6)' : '1px solid rgba(255,255,255,.1)';\n    el.style.background = top ? 'rgba(245,197,66,.1)' : 'rgba(255,255,255,.055)';\n    el.style.boxShadow = top ? '0 18px 44px -20px rgba(245,197,66,.6)' : 'none';\n\n    animateScore(el.querySelector('.lb-score'), x.i, x.final);\n  }\n\n  function animateScore(node, i, target){\n    var start = shownScore[i]!=null ? shownScore[i] : target;\n    if(start === target){ node.textContent = fmt(target); shownScore[i]=target; return; }\n    var t0 = null, dur = 700;\n    function step(ts){\n      if(shownScore[i] === target){ return; } // כבר הושלם (למשל ע\"י רשת-הביטחון)\n      if(t0==null) t0 = ts;\n      var p = Math.min(1, (ts - t0)/dur);\n      var ease = 1 - Math.pow(1-p, 3);\n      var val = start + (target - start)*ease;\n      node.textContent = fmt(val);\n      if(p\u003c1) requestAnimationFrame(step); else { shownScore[i] = target; }\n    }\n    requestAnimationFrame(step);\n    // רשת-ביטחון: אם rAF מושהה, ודא שהערך הסופי מוצג\n    setTimeout(function(){ if(shownScore[i] !== target){ node.textContent = fmt(target); shownScore[i] = target; } }, dur + 120);\n  }\n\n  function flashPlus(i, delta){\n    var el = rowEls[i]; if(!el) return;\n    var p = el.querySelector('.lb-plus');\n    p.textContent = (delta>0?'+':'') + delta;\n    p.style.color = delta>0 ? '#F5C542' : '#FF8A9B';\n    p.style.animation = 'none'; p.getBoundingClientRect();\n    p.style.animation = 'lbRise 1.1s ease-out';\n  }\n  function glowRow(el){ if(!el) return; el.style.animation = 'none'; el.getBoundingClientRect(); el.style.animation = 'lbGlow 1.1s ease-out'; }\n\n  // ════════════════════ פתיחה/סגירה ════════════════════\n  function openBoard(){\n    open = true;\n    overlay.style.display = 'flex';\n    controlBar.style.display = controlsOn ? 'flex' : 'none';\n    firstRender = true; prevRank = {}; shownScore = {};\n    buildGroupButtons();\n    requestRender();\n  }\n  function closeBoard(){\n    open = false;\n    if(document.fullscreenElement){ try{ document.exitFullscreen(); }catch(e){} }\n    overlay.style.display = 'none';\n  }\n\n  // ════════════════════ אתחול ════════════════════\n  function init(){\n    if(!document.body){ return setTimeout(init, 50); }\n    buildLaunchButton();\n    buildOverlay();\n    var tries = 0;\n    (function waitDb(){\n      if(connect()) return;\n      if(tries++ > 200) return;\n      setTimeout(waitDb, 100);\n    })();\n  }\n  init();\n})();\n\n\u003c/script>\n\u003c!-- LIVEBOARD_END -->\n\u003cx-dc>\n\u003chelmet>\n\u003clink rel=\"preconnect\" href=\"https://fonts.googleapis.com\">\n\u003clink rel=\"preconnect\" href=\"https://fonts.gstatic.com\" crossorigin=\"\">\n\u003cstyle>/* hebrew */\n@font-face {\n  font-family: 'Assistant';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"a3c1e30c-d614-4374-b1f9-8ab07ca20333\") format('woff2');\n  unicode-range: U+0307-0308, U+0590-05FF, U+200C-2010, U+20AA, U+25CC, U+FB1D-FB4F;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Assistant';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"e1a1237c-396e-4336-8c8d-8d2bfbd8968d\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Assistant';\n  font-style: normal;\n  font-weight: 400;\      \u003cinput type=\"number\" min=\"0\" data-path=\"votes\" value=\"{{ g.votes }}\" onchange=\"{{ onNum }}\" style=\"{{ inpSm }}\">\n          \u003c/div>\n          \u003cdiv style=\"height:1px;background:#EEF0F6;\">\u003c/div>\n          \u003cdiv style=\"display:flex;align-items:center;gap:12px;\">\n            \u003cdiv style=\"flex:1;\">\u003cdiv style=\"font-weight:700;font-size:15px;\">⚖️ בונוס בחירת השופטים\u003c/div>\u003cdiv style=\"font-size:13px;color:#8990A2;\">נקודות בונוס לשיקול דעת השופטים\u003c/div>\u003c/div>\n            \u003cinput type=\"number\" min=\"0\" data-path=\"bonus\" value=\"{{ g.bonus }}\" onchange=\"{{ onNum }}\" style=\"{{ inpSm }}\">\n          \u003c/div>\n        \u003c/div>\n      \u003c/div>\n\n      \u003c!-- sales tiers -->\n      \u003cdiv style=\"background:#fff;border:1px solid #E4E7F1;border-radius:18px;padding:24px;grid-column:1 / -1;\">\n        \u003cdiv style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;\">\n          \u003cdiv style=\"font-family:'Rubik';font-weight:700;font-size:19px;\">חזית 3 · מכירות — דירוג לכל רכז\u003c/div>\n          \u003cdiv style=\"font-size:13px;color:#8990A2;font-weight:600;\">עמידה=50 · מעבר=100 · שיא ארגוני=150\u003c/div>\n        \u003c/div>\n        \u003cdiv style=\"display:flex;flex-direction:column;gap:12px;\">\n          \u003csc-for list=\"{{ salesRows }}\" as=\"s\" hint-placeholder-count=\"1\">\n            \u003cdiv style=\"display:flex;align-items:center;gap:14px;background:#F7F8FC;border:1px solid #EAECF4;border-radius:12px;padding:12px 16px;flex-wrap:wrap;\">\n              \u003cdiv style=\"min-width:150px;\">\u003cdiv style=\"font-weight:700;font-size:15px;\">{{ s.nameOrDash }}\u003c/div>\u003cdiv style=\"font-size:13px;color:#8990A2;\">₪{{ s.monthlyFmt }} לחודש\u003c/div>\u003c/div>\n              \u003cdiv style=\"display:flex;gap:8px;margin-inline-start:auto;\">\n                \u003cbutton data-idx=\"{{ s.idx }}\" data-tier=\"0\" onclick=\"{{ setTierH }}\" style=\"{{ s.t0 }}\">ללא\u003c/button>\n                \u003cbutton data-idx=\"{{ s.idx }}\" data-tier=\"50\" onclick=\"{{ setTierH }}\" style=\"{{ s.t50 }}\">עמידה · 50\u003c/button>\n                \u003cbutton data-idx=\"{{ s.idx }}\" data-tier=\"100\" onclick=\"{{ setTierH }}\" style=\"{{ s.t100 }}\">מעבר · 100\u003c/button>\n                \u003cbutton data-idx=\"{{ s.idx }}\" data-tier=\"150\" onclick=\"{{ setTierH }}\" style=\"{{ s.t150 }}\">שיא · 150\u003c/button>\n              \u003c/div>\n            \u003c/div>\n          \u003c/sc-for>\n        \u003c/div>\n      \u003c/div>\n\n      \u003c!-- ops scores -->\n      \u003cdiv style=\"background:#fff;border:1px solid #E4E7F1;border-radius:18px;padding:24px;\">\n        \u003cdiv style=\"font-family:'Rubik';font-weight:700;font-size:19px;margin-bottom:4px;\">חזית 4 · תפעול — ניקוד לכל פנייה\u003c/div>\n        \u003cdiv style=\"font-size:13px;color:#8990A2;margin-bottom:14px;\">20 עד 70 נק' לכל פנייה\u003c/div>\n        \u003cdiv style=\"display:flex;flex-direction:column;gap:12px;\">\n          \u003csc-for list=\"{{ opsRows }}\" as=\"o\" hint-placeholder-count=\"1\">\n            \u003cdiv style=\"display:flex;align-items:center;gap:12px;background:#F7F8FC;border:1px solid #EAECF4;border-radius:12px;padding:12px 14px;\">\n              \u003cdiv style=\"flex:1;min-width:0;display:flex;flex-direction:column;\">\n                \u003cdiv style=\"{{ o.summaryStyle }}\">{{ o.summaryOrDash }}\u003c/div>\n                \u003cdiv style=\"font-size:12px;color:#8990A2;margin-top:2px;\">{{ o.handlerOrDash }}\u003c/div>\n                \u003cbutton onclick=\"{{ o.toggleExpand }}\" style=\"{{ o.toggleStyle }}\">{{ o.toggleLabel }}\u003c/button>\n              \u003c/div>\n              \u003cspan style=\"{{ o.recBadgeStyle }}\">{{ o.recBadge }}\u003c/span>\n              \u003cinput type=\"number\" min=\"0\" max=\"70\" data-path=\"{{ o.scorePath }}\" value=\"{{ o.score }}\" onchange=\"{{ onNum }}\" style=\"{{ inpSm }}\">\n            \u003c/div>\n          \u003c/sc-for>\n        \u003c/div>\n      \u003c/div>\n\n      \u003c!-- flagship score -->\n      \u003cdiv style=\"background:#fff;border:1px solid #E4E7F1;border-radius:18px;padding:24px;\">\n        \u003cdiv style=\"font-family:'Rubik';font-weight:700;font-size:19px;margin-bottom:4px;\">משימת העל · פיתוח\u003c/div>\n        \u003cdiv style=\"font-size:13px;color:#8990A2;margin-bottom:14px;\">פיתוח עובד = החל מ-50 נק'\u003c/div>\n        \u003cdiv style=\"background:#F7F8FC;border:1px solid #EAECF4;border-radius:12px;padding:14px;font-size:14px;color:#4A5063;line-height:1.5;min-height:56px;margin-bottom:12px;\">{{ flagDescOrDash }}\u003c/div>\n        \u003clabel style=\"display:block;\">\u003cspan style=\"{{ lbl }}\">הערות השופטים\u003c/span>\u003ctextarea rows=\"2\" placeholder=\"הערות\" data-path=\"flagship.notes\" value=\"{{ g.flagship.notes }}\" onchange=\"{{ onText }}\" style=\"{{ inp }}resize:vertical;\">{{ g.flagship.notes }}\u003c/textarea>\u003c/label>\n        \u003clabel style=\"display:block;margin-top:10px;\">\u003cspan style=\"{{ lbl }}\">ניקוד (50+)\u003c/span>\u003cinput type=\"number\" min=\"0\" data-path=\"flagship.score\" value=\"{{ g.flagship.score }}\" onchange=\"{{ onNum }}\" style=\"{{ inp }}\">\u003c/label>\n      \u003c/div>\n\n    \u003c/div>\n  \u003c/div>\n  \u003c/sc-if>\n\n  \u003c!-- ═══════════ SUMMARY ═══════════ -->\n  \u003csc-if value=\"{{ summary }}\" hint-placeholder-val=\"{{ false }}\">\n  \u003cdiv>\n    \u003cdiv style=\"display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:22px;flex-wrap:wrap;gap:16px;\">\n      \u003cdiv>\n        \u003ch1 style=\"font-family:'Rubik';font-weight:700;font-size:34px;margin:0;\">סיכום ניקוד — {{ activeName }}\u003c/h1>\n        \u003cp style=\"font-size:16px;color:#6B7183;margin:6px 0 0;\">פירוט הניקוד לפי חזית.\u003c/p>\n      \u003c/div>\n      \u003cdiv style=\"background:linear-gradient(135deg,#5A4BD4,#7C6BF0);color:#fff;border-radius:18px;padding:18px 32px;text-align:center;box-shadow:0 14px 30px -14px rgba(90,75,212,.7);\">\n        \u003cdiv style=\"font-size:14px;color:#E3DEFB;font-weight:600;\">ניקוד סופי\u003c/div>\n        \u003cdiv style=\"font-family:'Rubik';font-weight:800;font-size:44px;line-height:1;\">{{ c.finalFmt }}\u003c/div>\n      \u003c/div>\n    \u003c/div>\n    \u003cdiv style=\"display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px;margin-bottom:20px;\">\n      \u003cdiv style=\"background:#fff;border:1px solid #E4E7F1;border-radius:16px;padding:20px;\">\u003cdiv style=\"font-size:13px;color:#8990A2;font-weight:600;\">ניקוד אוטומטי מהמשימות\u003c/div>\u003cdiv style=\"font-family:'Rubik';font-weight:800;font-size:32px;color:#5A4BD4;\">{{ c.autoTotalFmt }}\u003c/div>\u003c/div>\n      \u003cdiv style=\"background:#fff;border:1px solid #E4E7F1;border-radius:16px;padding:20px;\">\u003cdiv style=\"font-size:13px;color:#8990A2;font-weight:600;\">ניקוד שופטים + בונוס\u003c/div>\u003cdiv style=\"font-family:'Rubik';font-weight:800;font-size:32px;color:#0E9E9E;\">{{ c.judgeTotalFmt }}\u003c/div>\u003c/div>\n      \u003cdiv style=\"background:#fff;border:1px solid #E4E7F1;border-radius:16px;padding:20px;\">\u003cdiv style=\"font-size:13px;color:#8990A2;font-weight:600;\">🗳️ הצבעות\u003c/div>\u003cdiv style=\"font-family:'Rubik';font-weight:800;font-size:32px;color:#D4872A;\">{{ c.votesFmt }}\u003c/div>\u003c/div>\n    \u003c/div>\n    \u003cdiv style=\"background:#fff;border:1px solid #E4E7F1;border-radius:18px;overflow:hidden;\">\n      \u003csc-for list=\"{{ breakdown }}\" as=\"b\" hint-placeholder-count=\"7\">\n        \u003cdiv style=\"display:flex;align-items:center;gap:16px;padding:16px 22px;border-bottom:1px solid #F0F2F8;\">\n          \u003cspan style=\"{{ b.dotStyle }}\">\u003c/span>\n          \u003cdiv style=\"flex:1;\">\u003cdiv style=\"font-weight:700;font-size:16px;\">{{ b.title }}\u003c/div>\u003cdiv style=\"font-size:13px;color:#8990A2;\">{{ b.note }}\u003c/div>\u003c/div>\n          \u003cdiv style=\"font-family:'Rubik';font-weight:800;font-size:24px;color:#191B26;\">{{ b.ptsFmt }} \u003cspan style=\"font-size:13px;color:#9AA0B2;font-weight:600;\">נק'\u003c/span>\u003c/div>\n        \u003c/div>\n      \u003c/sc-for>\n    \u003c/div>\n  \u003c/div>\n  \u003c/sc-if>\n\n  \u003c!-- ═══════════ LEADERBOARD ═══════════ -->\n  \u003csc-if value=\"{{ board }}\" hint-placeholder-val=\"{{ false }}\">\n  \u003cdiv>\n    \u003cdiv style=\"margin-bottom:24px;\">\n      \u003ch1 style=\"font-family:'Rubik';font-weight:800;font-size:38px;margin:0;\">לוח תוצאות חי\u003c/h1>\n      \u003cp style=\"font-size:16px;color:#6B7183;margin:6px 0 0;\">דירוג כל הקבוצות לפי הניקוד הכולל · מתעדכן בזמן אמת.\u003c/p>\n    \u003c/div>\n    \u003cdiv style=\"display:flex;flex-direction:column;gap:14px;\">\n      \u003csc-for list=\"{{ boardRows }}\" as=\"row\" hint-placeholder-count=\"5\">\n        \u003cdiv style=\"{{ row.cardStyle }}\">\n          \u003cdiv style=\"{{ row.rankStyle }}\">{{ row.rankLabel }}\u003c/div>\n          \u003cdiv style=\"flex:1;min-width:0;\">\n            \u003cdiv style=\"display:flex;align-items:baseline;gap:10px;\">\n              \u003cspan style=\"font-family:'Rubik';font-weight:700;font-size:22px;\">{{ row.name }}\u003c/span>\n              \u003cspan style=\"font-size:13px;color:#8990A2;font-weight:600;\">אוטומטי {{ row.autoFmt }} · שופטים {{ row.judgeFmt }} · 🗳️ {{ row.votesFmt }}\u003c/span>\n            \u003c/div>\n            \u003cdiv style=\"height:12px;background:#EDEFF6;border-radius:999px;overflow:hidden;margin-top:10px;\">\n              \u003cdiv style=\"{{ row.barStyle }}\">\u003c/div>\n            \u003c/div>\n          \u003c/div>\n          \u003cdiv style=\"text-align:center;flex-shrink:0;\">\u003cdiv style=\"font-family:'Rubik';font-weight:800;font-size:32px;line-height:1;color:{{ row.scoreColor }};\">{{ row.finalFmt }}\u003c/div>\u003cdiv style=\"font-size:12px;color:#9AA0B2;font-weight:600;\">נק' סה״כ\u003c/div>\u003c/div>\n        \u003c/div>\n      \u003c/sc-for>\n    \u003c/div>\n  \u003c/div>\n  \u003c/sc-if>\n\n  \u003c/main>\n\u003c/div>\n\u003c/x-dc>\n\u003cscript type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1180,&quot;height&quot;:760},&quot;salesTarget&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:420000,&quot;tsType&quot;:&quot;number&quot;,&quot;unit&quot;:&quot;₪&quot;,&quot;section&quot;:&quot;חוקי ניקוד&quot;},&quot;reviewsMin&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:10,&quot;tsType&quot;:&quot;number&quot;,&quot;section&quot;:&quot;חוקי ניקוד&quot;}}\">\nclass Component extends DCLogic {\n  constructor(props){\n    super(props);\n    this.state = { screen:'home', ag:0, data:null, expandedOps:{} };\n  }\n  componentDidMount(){\n    // ═══════════════════════════════════════════════════════════════\n    // חיבור ל-Firebase Realtime Database (סנכרון בין כל המכשירים)\n    // ⚠️ להחליף את ערכי \"YOUR_...\" בפרטי הפרויקט מ-Firebase Console\n    // ═══════════════════════════════════════════════════════════════\n    const firebaseConfig = {\n      apiKey: \"AIzaSyBQZcmY5e_ccC5Attb911zDfIz-HGsMnAM\",\n      authDomain: \"competition-scoring-platform.firebaseapp.com\",\n      databaseURL: \"https://competition-scoring-platform-default-rtdb.europe-west1.firebasedatabase.app\",\n      projectId: \"competition-scoring-platform\",\n      storageBucket: \"competition-scoring-platform.firebasestorage.app\",\n      messagingSenderId: \"573502970868\",\n      appId: \"1:573502970868:web:b4f4c79d4466952eb6b7a1\"\n    };\n\n    // מציגים מיד נתונים מקומיים כדי שהאתר לא יהיה תקוע על עמוד ריק\n    this.loadLocal();\n    // ממתינים ש-window.__db (שאותחל ב-helmet) יהיה מוכן ואז מתחברים בזמן אמת\n    this.waitForFirebase(0);\n  }\n  waitForFirebase(tries){\n    if (window.__db) { this.connectFirebase(); return; }\n    if (tries > 100) { // ~10 שניות — נשארים על גיבוי מקומי\n      console.warn(\"Firebase לא נטען; מצב מקומי בלבד.\");\n      return;\n    }\n    setTimeout(() => this.waitForFirebase(tries + 1), 100);\n  }\n  connectFirebase(){\n    try {\n      this.db = window.__db;\n      // מאזין לשינויים בזמן אמת — כל עדכון במכשיר אחד משתקף מיד בכולם\n      this.db.ref('comp_scoring_data').on('value', (snapshot) => {\n        let data = snapshot.val();\n        if (!data || !data.groups) {\n          data = this.seed();\n          this.db.ref('comp_scoring_data').set(data);\n        }\n        this.setState({ data });\n      }, (error) => {\n        console.error(\"Firebase fetch error, keeping local data:\", error);\n      });\n    } catch(e) { console.error(\"Firebase connect error:\", e); }\n  }\n  loadLocal(){\n    let data=null;\n    try{ data=JSON.parse(localStorage.getItem('comp_scoring_v1')); }catch(e){}\n    if(!data || !data.groups) data=this.seed();\n    this.setState({data});\n  }\n  seed(){\n    const mk=(name)=>({\n      name,\n      reviews:{withDetail:0,ratingOnly:0,withMedia:0,link:'',rejected:0},\n      leads:{brought:0,closed:0,rejected:0,link:''},\n      rec:{count:0,rejected:0,link:''},\n      resonance:[{views:0},{views:0},{views:0}],\n      sales:[{name:'',monthly:0,tier:0}],\n      ops:[{phone:'',handler:'',summary:'',score:0,recommendation:false}],\n      flagship:{description:'',notes:'',score:0},\n      votes:0, bonus:0\n    });\n    return { groups:[mk('קבוצה 1'),mk('קבוצה 2'),mk('קבוצה 3'),mk('קבוצה 4'),mk('קבוצה 5')] };\n  }\n  save(data){\n    // שמירה כפולה: גיבוי מקומי + עדכון הענן לכל המכשירים\n    try{ localStorage.setItem('comp_scoring_v1', JSON.stringify(data)); }catch(e){}\n    try{ if(this.db) this.db.ref('comp_scoring_data').set(data); }catch(e){ console.error(\"Error saving to Firebase:\", e); }\n  }\n  update(fn){\n    this.setState(s=>{\n      const data=JSON.parse(JSON.stringify(s.data));\n      fn(data, s.ag);\n      this.save(data);\n      return { data };\n    });\n  }\n  setPath(path, value){\n    this.update((data,ag)=>{\n      const parts=path.split('.');\n      let o=data.groups[ag];\n      for(let i=0;i\u003cparts.length-1;i++) o=o[parts[i]];\n      o[parts[parts.length-1]]=value;\n    });\n  }\n  n(x){ const v=Number(x); return isNaN(v)?0:v; }\n  calc(g){\n    const n=this.n.bind(this);\n    const reviewsTotal = n(g.reviews.withDetail)+n(g.reviews.ratingOnly);\n    const revApproved = Math.max(0, n(g.reviews.withDetail) - n(g.reviews.rejected));\n    const reviewsPts = revApproved*10;\n    const reviewsMin = this.props.reviewsMin ?? 10;\n    const reviewsWarn = revApproved>0 && revApproved\u003creviewsMin;\n    const leadsClosed = Math.max(0, n(g.leads.closed)-n(g.leads.rejected));\n    const leadsPts = leadsClosed*10;\n    const recApproved = Math.max(0, n(g.rec.count)-n(g.rec.rejected));\n    const recPts = recApproved*15;\n    const tier=v=>{v=n(v); return v>=20000?80:v>=5000?40:v>0?20:0;};\n    const resonancePts = g.resonance.reduce((a,v)=>a+tier(v.views),0);\n    const salesPts = g.sales.reduce((a,c)=>a+n(c.tier),0);\n    const opsPts = g.ops.reduce((a,c)=>a+n(c.score),0);\n    const flagPts = n(g.flagship.score);\n    const autoTotal = reviewsPts+leadsPts+recPts+resonancePts;\n    const judgeTotal = salesPts+opsPts+flagPts+n(g.bonus);\n    const final = autoTotal+judgeTotal;\n    const f=x=>Math.round(x).toLocaleString('en-US');\n    return { reviewsTotal, revApproved, reviewsPts, reviewsWarn, leadsClosed, leadsPts, recApproved, recPts,\n      resonancePts, salesPts, opsPts, flagPts, autoTotal, judgeTotal, final, votes:n(g.votes),\n      reviewsPtsFmt:f(reviewsPts), leadsPtsFmt:f(leadsPts), recPtsFmt:f(recPts), resonancePtsFmt:f(resonancePts),\n      salesPtsFmt:f(salesPts), opsPtsFmt:f(opsPts), flagPtsFmt:f(flagPts), autoTotalFmt:f(autoTotal),\n      judgeTotalFmt:f(judgeTotal), finalFmt:f(final), votesFmt:f(n(g.votes)) };\n  }\n  renderVals(){\n    const S=this.state;\n    if(!S.data) return { home:true };\n    const ag=S.ag, screen=S.screen;\n    const g=S.data.groups[ag];\n    const c=this.calc(g);\n    const n=this.n.bind(this);\n    const f=x=>Math.round(x).toLocaleString('en-US');\n    const salesTarget=this.props.salesTarget ?? 400000;\n    const reviewsMin=this.props.reviewsMin ?? 10;\n\n    // shared styles\n    const lbl='display:block;font-size:13px;font-weight:600;color:#7B8194;margin-bottom:5px;';\n    const inp='width:100%;box-sizing:border-box;font-family:Assistant,sans-serif;font-size:15px;font-weight:600;color:#191B26;background:#F7F8FC;border:1px solid #E2E4EE;border-radius:10px;padding:10px 13px;outline:none;';\n    const inpSm='width:88px;box-sizing:border-box;text-align:center;font-family:Rubik,sans-serif;font-size:17px;font-weight:700;color:#191B26;background:#F7F8FC;border:1px solid #E2E4EE;border-radius:10px;padding:9px 8px;outline:none;';\n    const inpRead='width:100%;box-sizing:border-box;font-family:Rubik,sans-serif;font-size:16px;font-weight:700;color:#0E9E7A;background:#ECF7F2;border:1px solid #CFEBDF;border-radius:10px;padding:10px 13px;';\n    const warn='margin-top:12px;background:#FDF3E7;border:1px solid #F3D9B0;color:#B5741B;font-weight:600;font-size:13px;padding:9px 13px;border-radius:10px;';\n    const btnAdd='margin-top:14px;background:#F0F1F7;border:1px dashed #C7CBDA;color:#5A4BD4;font-weight:700;font-size:14px;padding:10px 16px;border-radius:10px;cursor:pointer;';\n    const btnRemove='flex-shrink:0;width:34px;height:34px;border-radius:9px;border:1px solid #EBD3D3;background:#FBEEEE;color:#D0524E;font-weight:700;font-size:14px;cursor:pointer;';\n\n    // nav tab styles\n    const tabBase='display:inline-flex;align-items:center;gap:7px;font-weight:700;font-size:14px;padding:9px 15px;border-radius:10px;border:none;cursor:pointer;transition:all .15s;';\n    const tabOn=tabBase+'background:#fff;color:#5A4BD4;box-shadow:0 2px 8px -2px rgba(16,18,40,.18);';\n    const tabOff=tabBase+'background:transparent;color:#7B8194;';\n    const tab=(name)=> screen===name?tabOn:tabOff;\n\n    // group selector tabs\n    const groupTabs=S.data.groups.map((gr,i)=>({\n      name:gr.name, i,\n      style:'font-weight:700;font-size:14px;padding:9px 18px;border-radius:10px;cursor:pointer;border:1px solid '+(i===ag?'#5A4BD4':'#E1E4EF')+';background:'+(i===ag?'#5A4BD4':'#fff')+';color:'+(i===ag?'#fff':'#4A5063')+';',\n      select:()=>this.setState({ag:i})\n    }));\n\n    // resonance rows\n    const tierPts=v=>{v=n(v); return v>=20000?80:v>=5000?40:v>0?20:0;};\n    const resRows=g.resonance.map((r,i)=>{\n      const pts=tierPts(r.views);\n      const pillBg = pts>=80?'#E7E4FA':pts>=40?'#E1F4F2':pts>0?'#FBEEDD':'#F0F1F7';\n      const pillC = pts>=80?'#5A4BD4':pts>=40?'#0C8E8E':pts>0?'#C47A1E':'#9AA0B2';\n      const milestone = pts>=80?'מעל 20K':pts>=40?'מעל 5K':pts>0?'יצירה':'ללא צפיות';\n      return { num:i+1, views:r.views, path:'resonance.'+i+'.views', pts, milestone,\n        pillLabel: milestone+' · '+pts+' נק\\'',\n        pillStyle:'flex-shrink:0;min-width:120px;text-align:center;font-family:Rubik;font-weight:700;font-size:13px;padding:8px 10px;border-radius:9px;background:'+pillBg+';color:'+pillC+';' };\n    });\n\n    // sales rows\n    const tierLabel=t=>t>=150?'שיא · 150':t>=100?'מעבר · 100':t>=50?'עמידה · 50':'טרם דורג';\n    const salesRows=g.sales.map((s,i)=>{\n      const t=n(s.tier);\n      const pillBg=t>0?'#ECF7F2':'#F0F1F7', pillC=t>0?'#0E9E7A':'#9AA0B2';\n      const tbtn=(val,on)=>'font-weight:700;font-size:13px;padding:8px 12px;border-radius:9px;cursor:pointer;border:1px solid '+(on?'#0E9E9E':'#E1E4EF')+';background:'+(on?'#0E9E9E':'#fff')+';color:'+(on?'#fff':'#5A6070')+';';\n      return { idx:i, name:s.name, nameOrDash:s.name||'רכז ללא שם', monthly:s.monthly, monthlyFmt:f(n(s.monthly)),\n        namePath:'sales.'+i+'.name', monthlyPath:'sales.'+i+'.monthly',\n        tierLabel:tierLabel(t),\n        tierPillStyle:'flex-shrink:0;min-width:78px;text-align:center;font-family:Rubik;font-weight:700;font-size:13px;padding:8px 10px;border-radius:9px;background:'+pillBg+';color:'+pillC+';',\n        t0:tbtn(0,t===0), t50:tbtn(50,t===50), t100:tbtn(100,t===100), t150:tbtn(150,t===150),\n        remove:()=>this.update((d,a)=>{ if(d.groups[a].sales.length>1) d.groups[a].sales.splice(i,1); })\n      };\n    });\n\n    // ops rows\n    const expandedOps=this.state.expandedOps||{};\n    const opsRows=g.ops.map((o,i)=>{\n      const sc=n(o.score);\n      const rec=!!o.recommendation;\n      const fullText=o.summary||'פנייה ללא תיאור';\n      const isLong=fullText.length>42;\n      const isOpen=!!expandedOps[this.state.ag+'_'+i];\n      const pillBg=sc>0?'#ECF7F2':'#F0F1F7', pillC=sc>0?'#0E9E7A':'#9AA0B2';\n      const recOn='display:inline-flex;align-items:center;gap:7px;font-weight:700;font-size:13px;padding:8px 13px;border-radius:9px;cursor:pointer;border:1px solid #C7BEF3;background:#EEEBFB;color:#5A4BD4;';\n      const recOff='display:inline-flex;align-items:center;gap:7px;font-weight:700;font-size:13px;padding:8px 13px;border-radius:9px;cursor:pointer;border:1px solid #E1E4EF;background:#fff;color:#8990A2;';\n      return { idx:i, phone:o.phone, handler:o.handler, summary:o.summary, score:o.score, rec,\n        phonePath:'ops.'+i+'.phone', handlerPath:'ops.'+i+'.handler', summaryPath:'ops.'+i+'.summary', scorePath:'ops.'+i+'.score',\n        summaryOrDash:fullText, handlerOrDash:o.handler?('טופל ע״י '+o.handler):'—',\n        isLong, isOpen,\n        summaryStyle: isOpen\n          ? 'font-weight:700;font-size:14px;white-space:normal;line-height:1.5;max-height:150px;overflow-y:auto;'\n          : 'font-weight:700;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;',\n        toggleLabel: isOpen?'הצג פחות ▲':'הצג עוד ▼',\n        toggleStyle:'align-self:flex-start;margin-top:4px;background:none;border:none;padding:0;cursor:pointer;color:#5A4BD4;font-family:Assistant,sans-serif;font-weight:700;font-size:12px;'+(isLong?'':'display:none;'),\n        toggleExpand:()=>this.setState(s=>{ const k=this.state.ag+'_'+i; const e={...(s.expandedOps||{})}; e[k]=!e[k]; return {expandedOps:e}; }),\n        recStyle: rec?recOn:recOff, recLabel: rec?'✓ השאיר המלצה':'סמנו אם השאיר המלצה',\n        recBadge: rec?'עם המלצה · עד 70 נק\\'':'טיפול בלבד · 20 נק\\'',\n        recBadgeStyle:'font-size:12px;font-weight:700;padding:5px 10px;border-radius:7px;background:'+(rec?'#EEEBFB':'#F0F1F7')+';color:'+(rec?'#5A4BD4':'#8990A2')+';',\n        toggleRec:()=>this.update((d,a)=>{ d.groups[a].ops[i].recommendation=!d.groups[a].ops[i].recommendation; }),\n        scorePillStyle:'font-family:Rubik;font-weight:700;font-size:14px;padding:6px 12px;border-radius:8px;background:'+pillBg+';color:'+pillC+';',\n        remove:()=>this.update((d,a)=>{ if(d.groups[a].ops.length>1) d.groups[a].ops.splice(i,1); })\n      };\n    });\n\n    // summary breakdown\n    const mkDot=col=>'width:12px;height:12px;border-radius:50%;flex-shrink:0;background:'+col+';';\n    const breakdown=[\n      {title:'חזית 1 · ביקורות גוגל', note:c.revApproved+' ביקורות מפורטות מאושרות (10 נק\\' כ\\\"א)', pts:c.reviewsPts, col:'#5A4BD4'},\n      {title:'נוהל מפיץ · לידים', note:c.leadsClosed+' לידים שנסגרו', pts:c.leadsPts, col:'#D4872A'},\n      {title:'חזית 2 · סרטוני ממליצים', note:c.recApproved+' סרטונים מאושרים', pts:c.recPts, col:'#C43F28'},\n      {title:'חזית 2 · סרטוני תהודה', note:'לפי צפיות בפועל', pts:c.resonancePts, col:'#C43F28'},\n      {title:'חזית 3 · מכירות', note:g.sales.length+' רכזים · דירוג שופט', pts:c.salesPts, col:'#0C8E8E'},\n      {title:'חזית 4 · מצוינות תפעולית', note:g.ops.length+' פניות · ניקוד שופט', pts:c.opsPts, col:'#5A4BD4'},\n      {title:'משימת העל · פיתוח + בונוס', note:'פיתוח '+f(c.flagPts)+' + בונוס '+f(n(g.bonus)), pts:c.flagPts+n(g.bonus), col:'#191B26'}\n    ].map(b=>({ ...b, ptsFmt:f(b.pts), dotStyle:mkDot(b.col) }));\n\n    // leaderboard\n    const raw=S.data.groups.map((gr,i)=>{ const cc=this.calc(gr); return { name:gr.name, i, final:cc.final, autoTotal:cc.autoTotal, judgeTotal:cc.judgeTotal, votes:cc.votes }; });\n    const sorted=[...raw].sort((a,b)=> b.final-a.final || b.votes-a.votes);\n    const maxF=Math.max(1,...sorted.map(x=>x.final));\n    const medals=['🥇','🥈','🥉'];\n    const boardRows=sorted.map((x,idx)=>{\n      const top=idx===0;\n      const barCol = idx===0?'linear-gradient(90deg,#5A4BD4,#7C6BF0)':idx===1?'#0E9E9E':idx===2?'#D4872A':'#B4B9C9';\n      return { name:x.name, autoFmt:f(x.autoTotal), judgeFmt:f(x.judgeTotal), votesFmt:f(x.votes), finalFmt:f(x.final),\n        rankLabel: idx\u003c3?medals[idx]:String(idx+1),\n        scoreColor: top?'#5A4BD4':'#191B26',\n        cardStyle:'display:flex;align-items:center;gap:20px;background:#fff;border:1px solid '+(top?'#C9BFF6':'#E4E7F1')+';border-radius:18px;padding:20px 24px;'+(top?'box-shadow:0 14px 34px -18px rgba(90,75,212,.55);':''),\n        rankStyle:'flex-shrink:0;width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-family:Rubik;font-weight:800;font-size:'+(idx\u003c3?'26px':'22px')+';background:'+(top?'#EEEBFB':'#F2F3F9')+';color:#5A4BD4;',\n        barStyle:'height:100%;width:'+(x.final/maxF*100)+'%;border-radius:999px;background:'+barCol+';transition:width .5s;' };\n    });\n\n    // handlers\n    const onNum=(e)=>this.setPath(e.target.dataset.path, e.target.value===''?'':Number(e.target.value));\n    const onText=(e)=>this.setPath(e.target.dataset.path, e.target.value);\n    const setTierH=(e)=>{ const i=Number(e.currentTarget.dataset.idx), t=Number(e.currentTarget.dataset.tier); this.update((d,a)=>{ d.groups[a].sales[i].tier=t; }); };\n    const addCoord=()=>this.update((d,a)=>{ d.groups[a].sales.push({name:'',monthly:0,tier:0}); });\n    const addCase=()=>this.update((d,a)=>{ d.groups[a].ops.push({phone:'',handler:'',summary:'',score:0,recommendation:false}); });\n    const resetAll=()=>{ if(confirm('לאפס את כל הנתונים?')){ const s=this.seed(); this.save(s); this.setState({data:s, ag:0}); } };\n\n    return {\n      home:screen==='home', entry:screen==='entry', judge:screen==='judge', summary:screen==='summary', board:screen==='board',\n      showSelector: screen==='entry'||screen==='judge'||screen==='summary',\n      goHome:()=>this.setState({screen:'home'}), goEntry:()=>this.setState({screen:'entry'}),\n      goJudge:()=>this.setState({screen:'judge'}), goSummary:()=>this.setState({screen:'summary'}), goBoard:()=>this.setState({screen:'board'}),\n      tabHome:tab('home'), tabEntry:tab('entry'), tabJudge:tab('judge'), tabSummary:tab('summary'), tabBoard:tab('board'),\n      g, c, activeName:g.name, groupTabs, resRows, salesRows, opsRows, breakdown, boardRows,\n      salesTarget, salesTargetFmt:f(salesTarget), reviewsMin,\n      flagDescOrDash:g.flagship.description||'— הקבוצה טרם הזינה תיאור פיתוח —',\n      lbl, inp, inpSm, inpRead, warn, btnAdd, btnRemove,\n      onNum, onText, setTierH, addCoord, addCase, resetAll\n    };\n  }\n}\n\u003c/script>\n\n\n\u003c/body>\u003c/html>"</script>
